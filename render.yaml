services:
  - type: web
    name: ageguard-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false   # Set manually in Render dashboard: mongodb+srv://...
      - key: AI_SERVICE_URL
        sync: false   # Set to: https://ageguard-ai.onrender.com (after AI service deploys)
      - key: FIREBASE_PROJECT_ID
        sync: false   # Your Firebase project ID
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false   # Paste full service account JSON string here

  - type: web
    name: ageguard-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: ai_services
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
